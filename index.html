<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Teste de Ray Marching</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #FFF;
      font-family: sans-serif;
      overflow: hidden;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.7);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <canvas id="canvas" style="display: block;"></canvas>
  <div id="info">FPS: ---</div>

  <script type="glsl" id="frag">
    precision highp float;
    uniform vec2 uResolution;
    uniform float uTime;

    vec3 rayDirection(float fov, vec2 size, vec2 fragCoord) {
      vec2 xy = fragCoord - size / 2.0;
      float z = size.y / tan(radians(fov) / 2.0);
      return normalize(vec3(xy, -z));
    }

    float sphere(vec3 p, float r) {
      return length(p) - r;
    }

    float map(vec3 p) {
      return sphere(p - vec3(sin(uTime)*3.0, 0.0, 0.0), 2.0);
    }

    vec3 calcNormal(vec3 p) {
      const float eps = 0.001;
      return normalize(vec3(
        map(p + vec3(eps,0,0)) - map(p - vec3(eps,0,0)),
        map(p + vec3(0,eps,0)) - map(p - vec3(0,eps,0)),
        map(p + vec3(0,0,eps)) - map(p - vec3(0,0,eps))
      ));
    }

    vec3 shade(vec3 ro, vec3 rd, float t) {
      vec3 p = ro + rd * t;
      vec3 light = normalize(vec3(1.0, 1.0, 1.0));
      vec3 normal = calcNormal(p);
      float diff = max(0.0, dot(normal, light));
      vec3 col = 0.5 + 0.5 * sin(p.x + uTime + 0.0) * 0.5;
      col *= diff * 0.8 + 0.2;
      return col;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / uResolution.xy;
      vec3 ro = vec3(0.0, 0.0, -5.0);
      vec3 rd = rayDirection(60.0, uResolution.xy, gl_FragCoord.xy);

      float t = 0.0;
      for (int i = 0; i < 128; i ++) { // aumente este número para deixar mais pesado
        vec3 p = ro + rd * t;
        float d = map(p);
        if (d < 0.001 || t > 50.0) break;
        t += d * 0.5;
      }

      vec3 color = t < 50.0 ? shade(ro, rd, t) : vec3(0.0);

      gl_FragColor = vec4(color, 1.0);
    }
  </script>

  <script>
    const canvas = document.getElementById("canvas");
    const info = document.getElementById("info");
    const gl = canvas.getContext("webgl");

    if (!gl) {
      alert("WebGL não suportado");
      throw "WebGL not supported";
    }

    // Programa GLSL
    const vs = `
      attribute vec2 position;
      void main() {
        gl_Position = vec4(position, 0.0, 1.0);
      }
    `;
    const fs = document.getElementById("frag").textContent;

    const program = gl.createProgram();
    const vShader = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vShader, vs);
    gl.compileShader(vShader);
    gl.attachShader(program, vShader);

    const fShader = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fShader, fs);
    gl.compileShader(fShader);
    gl.attachShader(program, fShader);

    gl.linkProgram(program);
    gl.useProgram(program);

    // Vértices do quad
    const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
    const vbo = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
    gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

    const posLoc = gl.getAttribLocation(program, "position");
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(pos退役军人Loc, 2, gl.FLOAT, false, 0, 0);

    const resolutionLoc = gl.getUniformLocation(program, "uResolution");
    const timeLoc = gl.getUniformLocation(program, "uTime");

    // Loop de animação
    let frameCount = 0;
    let lastTime = 0;
    let fps = 0;

    function animate(now) {
      now *= 0.001;
      frameCount++;
      if (now - lastTime >= 1.0) {
        fps = frameCount;
        frameCount = 0;
        lastTime = now;
        info.textContent = `FPS: ${fps}`;
      }

      // Tamanho do canvas
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      gl.uniform2f(resolutionLoc, canvas.width, canvas.height);
      gl.uniform1f(timeLoc, now);

      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      requestAnimationFrame(animate);
    }

    animate(0);
  </script>
</body>
</html>
